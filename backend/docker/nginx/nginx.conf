server {
    listen 80;
    index index.php index.html;
    root /CV_Core/public;
    server_tokens off;

    # ── Logging ─────────────────────────────────────────────────
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # ── Body / buffer limits ────────────────────────────────────
    client_max_body_size    10M;
    client_body_buffer_size 128k;

    # ── Gzip ────────────────────────────────────────────────────
    #
    # OPTIMIZATION #11 — Enable Gzip Compression (Brotli requires nginx module)
    #
    # WHY: JSON API responses are text-based and highly compressible.
    #      A typical CV JSON response (~5 KB) compresses to ~1.2 KB with gzip.
    #      That's a 75% reduction in transfer size → faster page loads.
    #
    # gzip_comp_level: 6 is the sweet spot. Level 1-3 = fast but poor ratio.
    #                  Level 7-9 = marginally better ratio but 2-3x more CPU.
    #                  Level 6 gives ~95% of max compression at ~50% of CPU.
    #
    # gzip_min_length: Skip compressing tiny responses (<256 bytes).
    #                  The gzip header overhead (18 bytes) makes it pointless.
    #
    # Note: For Brotli (20-30% better than gzip), you'd need the nginx
    #       brotli module compiled in. Gzip is universally supported.
    #
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/x-javascript
        application/vnd.ms-fontobject
        font/opentype
        image/svg+xml;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Deny hidden / sensitive files ───────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Static assets: cache for 30 days ────────────────────────
    location ~* \.(css|js|ico|gif|jpe?g|png|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── PHP routing ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # Buffer tuning
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;

        # Keep-alive to PHP-FPM
        fastcgi_keep_conn on;
    }
}

